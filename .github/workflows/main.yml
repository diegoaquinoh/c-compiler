name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre g++ uuid-dev pkg-config

    - name: Install ANTLR4 C++ runtime
      run: |
        sudo apt-get install -y cmake
        cd /tmp
        curl -LO https://www.antlr.org/download/antlr-4.13.2-complete.jar
        curl -LO https://www.antlr.org/download/antlr4-cpp-runtime-4.13.2-source.zip
        unzip antlr4-cpp-runtime-4.13.2-source.zip -d antlr4-runtime
        cd antlr4-runtime
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Configure config.mk
      run: |
        cat > compiler/config.mk << 'EOF'
        ANTLRJAR=/tmp/antlr-4.13.2-complete.jar
        ANTLRINC=/usr/local/include/antlr4-runtime
        ANTLRLIB=/usr/local/lib/libantlr4-runtime.a
        EOF

    - name: Build
      run: cd compiler && make

    - name: Test
      run: python3 ifcc-test.py testfiles
